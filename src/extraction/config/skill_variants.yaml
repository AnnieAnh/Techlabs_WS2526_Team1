# Canonical skill variant spellings shared across the extraction and cleaning pipelines.
# Key = canonical skill name (as stored in technical_skills / nice_to_have_skills).
# Value = list of lowercase plain-substring alternatives that count as a match.
# Both extraction/validators/hallucination.py and cleaning/skill_normalizer.py load from this file.
#
# Includes German compound words and translations for German-language job descriptions.
# Substring matching is used — "softwareentwicklung" will match "softwareentwicklungsprozesse".

