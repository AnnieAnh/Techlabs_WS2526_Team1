# German geography reference data for location parsing.
# All English state names match exactly what appears on LinkedIn.

# -----------------------------------------------------------------------
# 16 German federal states — canonical English names
# -----------------------------------------------------------------------
states:
  - Baden-Württemberg
  - Bavaria
  - Berlin
  - Brandenburg
  - Bremen
  - Hamburg
  - Hesse
  - Lower Saxony
  - Mecklenburg-West Pomerania
  - North Rhine-Westphalia
  - Rhineland-Palatinate
  - Saarland
  - Saxony
  - Saxony-Anhalt
  - Schleswig-Holstein
  - Thuringia

# -----------------------------------------------------------------------
# German-language state names → English canonical name
# Used when the data contains German state names instead of English.
# -----------------------------------------------------------------------
german_to_english_states:
  Bayern: Bavaria
  Baden-Württemberg: Baden-Württemberg   # unchanged
  Hessen: Hesse
  Niedersachsen: Lower Saxony
  Nordrhein-Westfalen: North Rhine-Westphalia
  "Mecklenburg-Vorpommern": Mecklenburg-West Pomerania
  Rheinland-Pfalz: Rhineland-Palatinate
  Sachsen: Saxony
  Sachsen-Anhalt: Saxony-Anhalt
  Thüringen: Thuringia
  Brandenburg: Brandenburg               # unchanged
  Berlin: Berlin                         # unchanged
  Hamburg: Hamburg                       # unchanged
  Bremen: Bremen                         # unchanged
  Saarland: Saarland                     # unchanged
  Schleswig-Holstein: Schleswig-Holstein # unchanged

# -----------------------------------------------------------------------
# 2-letter state codes → English canonical name
# Used in "City, CODE, DE" format (e.g. "München, BY, DE")
# -----------------------------------------------------------------------
state_codes:
  BE: Berlin
  BY: Bavaria
  BW: Baden-Württemberg
  HH: Hamburg
  HE: Hesse
  NW: North Rhine-Westphalia
  SN: Saxony
  HB: Bremen
  NI: Lower Saxony
  RP: Rhineland-Palatinate
  SL: Saarland
  ST: Saxony-Anhalt
  SH: Schleswig-Holstein
  MV: Mecklenburg-West Pomerania
  BB: Brandenburg
  TH: Thuringia

# -----------------------------------------------------------------------
# Cities where city name == state name (Stadtstaaten / city-states)
# "Berlin, Germany" → city=Berlin, state=Berlin
# -----------------------------------------------------------------------
city_is_state:
  - Berlin
  - Hamburg
  - Bremen

# -----------------------------------------------------------------------
# Region patterns → state (and optional city)
# These appear as single-part location strings (no commas).
# Matched case-insensitively by exact string.
# -----------------------------------------------------------------------
